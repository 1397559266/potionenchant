
#Potion Enchant Configuration
[general]
	#List of potion effects that cannot be enchanted onto armor or tools.
	#Format: modid:effect_name
	#Example: ["minecraft:strength", "minecraft:jump_boost"]
	#This will disable ALL potion variants (normal, long, strong) containing these effects.
	#不能附魔到盔甲或工具上的药水效果列表。
	#格式：modid:effect_name
	#示例：["minecraft:strength", "minecraft:jump_boost"]
	#这将禁用包含这些效果的所有药水变种（普通、延长、强化）。
	blacklisted_effects = []
	#
	#Whether to limit the number of potion enchantments on each armor piece.
	#是否限制每件盔甲能附魔的药水效果数量。
	#Default: false (关闭限制功能)
	limit_armor_enchants = false
	#Maximum number of potion enchantments allowed on each armor piece.
	#Only effective if limit_armor_enchants is true.
	#每件盔甲最多能附魔的药水效果数量。
	#仅在limit_armor_enchants为true时生效。
	#Default: 2
	#Range: 1 ~ 99999
	max_armor_enchants = 2
	#
	#Whether to limit the number of potion enchantments for all items
	#是否限制所有物品的药水附魔数量
	limit_all_enchants = false
	#Maximum number of potion effects that can be enchanted on all items
	#所有物品可附魔的最大药水效果数量
	#Range: 1 ~ 99999
	max_all_enchants = 3
	#Chance for Ultimate Potion Amulet to generate in loot tables (0-100%)
	#终极药水护符在战利品表中的生成概率（0-100%）
	#0 means never generate, 100 means always generate when conditions are met
	#0表示不生成，100表示满足条件时必定生成
	#Default: 1
	#Range: 0 ~ 100
	ultimate_potion_amulet_loot_chance = 1
	#Maximum level for potion enchantments on equipped items
	#装备的药水附魔等级上限
	#Default: 10
	#Range: 1 ~ 255
	max_potion_enchant_level = 100
	#Allow potion enchantment levels to exceed vanilla limit of 255
	#允许药水附魔等级突破原版255级上限
	#When enabled, potion effects can have levels beyond 255 (up to Integer.MAX_VALUE)
	#启用后，药水效果可以拥有超过255的等级（最高可达Integer.MAX_VALUE）
	#Default: false (关闭)
	allow_potion_level_beyond_255 = false

	#Enchant Settings
	[general.enchant]
		#Allow enchantment levels to break vanilla cap (no upper limit, can exceed 255)
		#允许附魔等级突破原版上限（无限制，可超过255级）
		#When enabled, enchantments applied via Universal Enchantment Book have no level cap
		#启用后，通过万能附魔书应用的附魔等级无上限
		#Default: false (关闭)
		allow_enchant_level_beyond_cap = false
		#Experience level cost per enchantment level for the Universal Enchantment Book
		#万能附魔书每级附魔消耗的经验值（非等级），默认1000
		#Default: 1000 (experience points)
		#Range: > 1
		enchant_book_xp_cost = 1000
		#Whether mod enchantments can be obtained via vanilla enchanting table
		#本模组的附魔是否能通过原版附魔台获取
		#Default: false (关闭)
		discoverable_in_enchanting_table = false

	#Display Settings
	[general.display]
		#Enable custom potion effect HUD (text-based instead of icons)
		#启用自定义药水效果HUD（文字显示替代图标）
		#Default: true (开启)
		custom_potion_hud = true
		#Show potion effect level in custom HUD
		#在自定义HUD中显示药水等级
		#Default: true (开启)
		show_potion_level = true
		#Show text background box in custom HUD
		#在自定义HUD中显示文本背景框
		#Default: false (关闭)
		show_text_background = false
		#Maximum number of visible potion effects at once (scroll to see more)
		#同时显示的最大药水效果数量（滚动查看更多）
		#Default: 10
		#Range: 3 ~ 50
		max_visible_effects = 10
		#Show scroll hint text (Tab+滚轮) in custom HUD
		#在自定义HUD中显示滚动提示文字（Tab+滚轮）
		#Default: true (开启)
		show_scroll_hint = true
		#Set custom potion HUD rendering priority to highest (renders above other overlays)
		#将自定义药水HUD渲染优先级调至最高（在其他覆盖层之上渲染）
		#Default: true (开启)
		hud_high_priority = true
		#Enable PotionCore armor value rendering (extra armor overlays)
		#启用药水核心盔甲值渲染（额外护甲覆盖层）
		#Default: true (开启)
		enable_armor_value_render = true
		#Enable custom tooltip for potions to show effect descriptions
		#启用药水的自定义tooltip以显示效果描述
		#Default: true (开启)
		enable_custom_potion_tooltip = true
		#Show description for vanilla Minecraft potions
		#显示原版Minecraft药水的描述
		#Default: false (关闭)
		enable_vanilla_potion_description = false
		#Try to show descriptions for all potions from any mod
		#Requires language file key: effect.xxx.xxx.description
		#尝试显示所有模组药水的描述
		#需要语言文件键：effect.xxx.xxx.description
		#Default: false (关闭)
		enable_all_potion_description = false
		#Enable independent tooltip for potion enchantments
		#When enabled, items with potion enchantments will show a custom tooltip with enchantment details
		#启用药水附魔的独立tooltip
		#启用后，拥有药水附魔的物品将显示包含附魔详情的自定义tooltip
		#Default: false (关闭)
		enable_potion_enchant_tooltip = false
		#Maximum number of potion enchantments per column in tooltip (vertical auto-wrap)
		#Tooltip中药水附魔每列的最大数量（竖向自动换列）
		#Default: 10
		#Range: 1 ~ 50
		potion_enchant_tooltip_max_per_column = 10

